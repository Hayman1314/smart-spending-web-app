<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Spending</title>
    <link rel="stylesheet" href="UI and UX/Styles.css" />
  </head>
  <body>
    <div id="auth-panel" class="panel active">
      <h1>Spend Wise</h1>
      <h3>Create Your Account</h3>

      <input type="email" id="email" placeholder="Enter your email" />
      <input type="text" id="username" placeholder="Your name" />
      <input type="number" id="balance" placeholder="Starting balance" />

      <button onclick="createAccount()">Start</button>
      <p id="auth-message"></p>
    </div>

    <!-- 🧠 MAIN APP -->
    <div id="app" class="hidden">
      <!-- 🔹 Sidebar -->
      <aside class="sidebar">
        <h2>Spend Wise</h2>
        <ul>
          <li onclick="showPanel('dashboard')">Dashboard</li>
          <li onclick="showPanel('checkin')">Daily Check-In</li>
          <li onclick="showPanel('history')">History</li>
          <li onclick="showPanel('settings')">Settings</li>
        </ul>
      </aside>

      <!-- 🔹 Main Content -->
      <div class="main">
        <!-- 🔸 Topbar -->
        <header class="topbar">
          <h2 id="page-title">Dashboard</h2>
        </header>

        <section class="content">
          <!-- 📊 DASHBOARD -->
          <div id="dashboard" class="panel active">
            <h3>Monthly Overview</h3>

            <p>Total Balance: <span id="total-balance">0</span></p>
            <p>Monthly Limit: <span id="monthly-limit">0</span></p>
            <p>Spent This Month: <span id="monthly-spent">0</span></p>

            <div id="category-breakdown">
              <!-- JS will generate category summary -->
            </div>
          </div>

          <!-- 📝 DAILY CHECK-IN -->
          <div id="checkin" class="panel">
            <h3>Record Today's Expenses</h3>

            <!-- Time Slot -->
            <label>Time Period:</label>
            <select id="time-period">
              <option value="morning">12 AM - 12 PM</option>
              <option value="evening">12 PM - 12 AM</option>
            </select>

            <!-- Amount -->
            <input type="number" id="amount" placeholder="Amount spent" />

            <!-- Category -->
            <select id="category">
              <option value="">Select category</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Shopping">Shopping</option>
              <option value="Bills">Bills</option>
              <option value="Others">Others</option>
            </select>

            <!-- Note -->
            <input type="text" id="note" placeholder="Optional note" />

            <button onclick="addExpense()">Add Expense</button>
            <p id="checkin-message"></p>
          </div>

          <!-- 📜 HISTORY -->
          <div id="history" class="panel">
            <h3>Expense History</h3>
            <div id="history-list"></div>
          </div>

          <!-- ⚙️ SETTINGS -->
          <div id="settings" class="panel">
            <h3>Settings</h3>

            <label>Set Monthly Limit:</label>
            <input type="number" id="set-limit" />
            <button onclick="saveLimit()">Save Limit</button>

            <p id="settings-message"></p>
          </div>
        </section>
      </div>
    </div>

    <script src="UI and UX/scripts.js"></script>
  </body>
</html>
