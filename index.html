<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Spending</title>
  </head>
  <body>
    <!-- 🔐 AUTH -->
    <div id="auth">
      <h1>Spend Wise</h1>

      <input id="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <input id="name" placeholder="Name (for new users)" />
      <input id="balance" placeholder="Starting Balance" />
      <input id="limit" placeholder="Monthly Limit" />

      <button onclick="login()">Login</button>
      <button onclick="register()">Register</button>

      <p id="auth-msg"></p>
    </div>

    <!-- 🧠 APP -->
    <div id="app" style="display: none">
      <h2 id="welcome"></h2>

      <h3>Dashboard</h3>
      <p>Balance: <span id="balance-display"></span></p>
      <p>Monthly Limit: <span id="limit-display"></span></p>
      <p>Total Spent: <span id="spent-display">0</span></p>

      <h3>Daily Check-In</h3>

      <select id="time">
        <option value="AM">12 AM - 12 PM</option>
        <option value="PM">12 PM - 12 AM</option>
      </select>

      <input id="amount" placeholder="Amount" />
      <select id="category">
        <option>Food</option>
        <option>Transport</option>
        <option>Shopping</option>
        <option>Bills</option>
        <option>Other</option>
      </select>

      <input id="note" placeholder="Note" />
      <button onclick="addExpense()">Add</button>
      <p id="msg"></p>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
      import { getAuth } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
      import { getDatabase } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDSc0Ge5nLEDVGwdHuRKBC6rdhxD-oDMOk",
        authDomain: "smart-spending-bb90b.firebaseapp.com",
        databaseURL: "https://smart-spending-bb90b-default-rtdb.firebaseio.com",
        projectId: "smart-spending-bb90b",
        storageBucket: "smart-spending-bb90b.appspot.com",
        messagingSenderId: "945186984022",
        appId: "1:945186984022:web:243709af5ee45b02616bf7",
        measurementId: "G-12LYN5BK61",
      };

      const app = initializeApp(firebaseConfig);
      getAnalytics(app);
      const auth = getAuth();
      const database = getDatabase();

      // Make auth & database globally available
      window.firebaseAuth = auth;
      window.firebaseDB = database;
      window.login = () => import("./script.js").then((m) => m.login());
      window.register = () => import("./script.js").then((m) => m.register());
      window.addExpense = () =>
        import("./script.js").then((m) => m.addExpense());
    </script>
  </body>
</html>
