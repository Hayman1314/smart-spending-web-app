<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Spending</title>
</head>
<body>
  <div id="auth">
    <h1>Spend Wise</h1>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <input id="name" placeholder="Name (for new users)">
    <input id="balance" placeholder="Starting Balance">
    <input id="limit" placeholder="Monthly Limit">
    <button id="loginBtn">Login</button>
    <button id="registerBtn">Register</button>
    <p id="auth-msg" style="color:red;"></p>
  </div>

  <div id="app" style="display:none">
    <h2 id="welcome"></h2>
    <p>Balance: <span id="balance-display"></span></p>
    <p>Monthly Limit: <span id="limit-display"></span></p>
    <p>Total Spent: <span id="spent-display">0</span></p>

    <input id="amount" placeholder="Amount">
    <select id="category">
      <option>Food</option>
      <option>Transport</option>
      <option>Shopping</option>
      <option>Bills</option>
      <option>Other</option>
    </select>
    <input id="note" placeholder="Note">
    <button id="addBtn">Add Expense</button>
    <p id="msg" style="color:green;"></p>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js"></script>

  <script src="script.js"></script>
</body>
</html>
